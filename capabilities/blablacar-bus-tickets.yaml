naftiko: 1.0.0-alpha2
info:
  label: BlaBlaCar Bus API — Tickets
  description: 'BlaBlaCar Bus API — Tickets. 1 operations. Lead operation: BlaBlaCar Bus Get Ticket. Self-contained Naftiko
    capability covering one Blablacar Bus Api business surface.'
  tags:
  - Blablacar Bus Api
  - Tickets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BLABLACAR_BUS_API_API_KEY: BLABLACAR_BUS_API_API_KEY
capability:
  consumes:
  - type: http
    namespace: blablacar-bus-tickets
    baseUri: https://bus-api.blablacar.com/v1
    description: BlaBlaCar Bus API — Tickets business capability. Self-contained, no shared references.
    resources:
    - name: tickets-ticket_id
      path: /tickets/{ticket_id}
      operations:
      - name: getticket
        method: GET
        description: BlaBlaCar Bus Get Ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ticket_id
          in: path
          type: string
          description: Unique ticket identifier
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.BLABLACAR_BUS_API_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: blablacar-bus-tickets-rest
    port: 8080
    description: REST adapter for BlaBlaCar Bus API — Tickets. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/tickets/{ticket-id}
      name: tickets-ticket-id
      description: REST surface for tickets-ticket_id.
      operations:
      - method: GET
        name: getticket
        description: BlaBlaCar Bus Get Ticket
        call: blablacar-bus-tickets.getticket
        with:
          ticket_id: rest.ticket_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: blablacar-bus-tickets-mcp
    port: 9090
    transport: http
    description: MCP adapter for BlaBlaCar Bus API — Tickets. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: blablacar-bus-get-ticket
      description: BlaBlaCar Bus Get Ticket
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: blablacar-bus-tickets.getticket
      with:
        ticket_id: tools.ticket_id
      outputParameters:
      - type: object
        mapping: $.
