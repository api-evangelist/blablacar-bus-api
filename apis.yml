  - type: Features
    data:
      - name: Route Search
        description: >-
          Search available coach routes between origin and destination stations
          across European markets with departure dates and passenger counts.
      - name: Seat Availability
        description: >-
          Check real-time seat availability and pricing for specific routes,
          trips, and departure times.
      - name: Booking Creation
        description: >-
          Create confirmed bookings for passengers with seat selection, passenger
          details, and payment processing integration.
      - name: Ticket Management
        description: >-
          Retrieve, modify, and cancel tickets with electronic ticket delivery
          and QR code generation.
      - name: Station Information
        description: >-
          Access comprehensive station data including names, addresses, GPS
          coordinates, and amenities across the BlaBlaCar Bus network.
      - name: Multi-Market Coverage
        description: >-
          Single API integration covering coach routes across France, Germany,
          Poland, Spain, Italy, Ukraine, and other European markets.
  - type: UseCases
    data:
      - name: OTA Integration
        description: >-
          Online travel agencies can search and book BlaBlaCar Bus routes alongside
          trains, flights, and car rentals for multimodal journey planning.
      - name: Travel Aggregator
        description: >-
          Price comparison and travel search engines can surface BlaBlaCar Bus
          options in coach and intercity bus search results.
      - name: Corporate Travel
        description: >-
          Enterprise travel management companies can include BlaBlaCar Bus as
          an affordable intercity transport option for business travelers.
      - name: Mobility Platform
        description: >-
          Mobility-as-a-Service platforms can integrate BlaBlaCar Bus as a
          long-distance transport mode in multimodal journey planning.
      - name: Reseller Programs
        description: >-
          Authorized resellers can distribute BlaBlaCar Bus tickets through
          their own branded channels and sales touchpoints.
  - type: Integrations
    data:
      - name: BlaBlaCar Carpooling
        description: >-
          BlaBlaCar Bus complements the carpooling marketplace, enabling
          multimodal journey planning combining bus and ridesharing.
      - name: Google Maps Platform
        description: >-
          Station coordinates and route data can be overlaid on mapping
          platforms for journey visualization.
