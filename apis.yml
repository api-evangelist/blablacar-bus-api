apis:
  - aid: blablacar-bus-api:blablacar-bus-api
    name: BlaBlaCar Bus API
    description: >-
      REST API for integrating with BlaBlaCar Bus (formerly BlaBlaBus) coach booking
      platform. Enables partners to search routes, check seat availability, create
      bookings, manage tickets, and receive booking confirmations. Targeted at OTAs,
      travel aggregators, mobility platforms, and enterprise travel management companies
      operating in European markets.
