name: BlaBlaCar Bus API
description: >-
  BlaBlaCar Bus API enables transport operators, OTAs, and travel aggregators to
  integrate with BlaBlaCar's coach and bus booking platform across Europe. The API
  provides access to route search, seat availability, booking creation, ticket
  management, and passenger notifications. BlaBlaCar Bus operates coach services
  across France, Germany, Poland, Spain, Italy, Ukraine, and other European markets
  under the BlaBlaBus brand.
